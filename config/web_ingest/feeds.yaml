# RSS/Atom feed list for `ingest_web_corpus`. All entries are stored in ``pool`` (default: omni).
# Increase ``max_total_articles`` and add feeds until you have enough rows for
# 13 site partitions × 100 = 1300+ articles.
#
# Politely respect site policies in production. For local dev, ``INGEST_IMAGE_ALLOW_ALL=1`` is default in code.

pool: omni
max_total_articles: 3000
max_entries_per_feed: 50
min_body_chars: 200

feeds:
